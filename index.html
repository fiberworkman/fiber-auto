<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>모자분리 공사요청 시스템</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- 로그인 -->
<div id="screen-login" class="screen active">
  <div class="login-bg"><div class="login-grid"></div></div>
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-icon">🏗️</span>
      <h1>모자분리<br><span>공사요청 시스템</span></h1>
      <p class="logo-sub">SK Broadband 수남구축팀</p>
    </div>
    <div class="login-form">
      <div class="form-group"><label>이메일</label><input type="email" id="login-email" placeholder="이메일 입력"></div>
      <div class="form-group"><label>비밀번호</label><input type="password" id="login-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div id="login-error" class="error-msg" style="display:none"></div>
      <button class="btn-primary full" onclick="doLogin()">로그인</button>
      <div class="login-divider"><span>또는</span></div>
      <button class="btn-outline full" onclick="showScreen('screen-register')">회원가입 신청</button>
      <button class="btn-ghost full" onclick="showPublicForm()">🔓 로그인 없이 신청하기</button>
    </div>
  </div>
</div>

<!-- 회원가입 -->
<div id="screen-register" class="screen">
  <div class="login-bg"><div class="login-grid"></div></div>
  <div class="login-box wide">
    <div class="login-logo">
      <span class="logo-icon">📝</span>
      <h1>회원가입 <span>신청</span></h1>
      <p class="logo-sub">관리자 승인 후 로그인 가능합니다</p>
    </div>
    <div class="login-form">
      <div class="form-row">
        <div class="form-group"><label>이름 *</label><input type="text" id="reg-name" placeholder="홍길동"></div>
        <div class="form-group"><label>연락처 *</label><input type="text" id="reg-phone" placeholder="010-0000-0000"></div>
      </div>
      <div class="form-group"><label>이메일 *</label><input type="email" id="reg-email" placeholder="example@email.com"></div>
      <div class="form-group"><label>소속 *</label><input type="text" id="reg-org" placeholder="예: PCNI Engineering, 이지전기통신, SKB"></div>
      <div class="form-group">
        <label>운용팀 (해당 시)</label>
        <select id="reg-team"><option value="">선택 안함</option><option>강남</option><option>동작</option><option>수원</option></select>
      </div>
      <div class="form-row">
        <div class="form-group"><label>비밀번호 *</label><input type="password" id="reg-pw"></div>
        <div class="form-group"><label>비밀번호 확인 *</label><input type="password" id="reg-pw2"></div>
      </div>
      <div id="reg-error" class="error-msg" style="display:none"></div>
      <div id="reg-ok" class="success-msg" style="display:none"></div>
      <button class="btn-primary full" onclick="doRegister()">가입 신청</button>
      <button class="btn-ghost full" onclick="showScreen('screen-login')">← 로그인으로</button>
    </div>
  </div>
</div>

<!-- 공개 접수폼 -->
<div id="screen-public" class="screen">
  <div class="app-header">
    <div class="header-left"><span class="logo-icon-sm">🏗️</span><span class="header-title">모자분리 신규신청</span></div>
    <button class="btn-ghost-sm" onclick="showScreen('screen-login')">로그인</button>
  </div>
  <div class="content-area">
    <div class="form-card">
      <h2 class="card-title">📋 모자분리 신규신청</h2>
      <p class="card-desc">아래 항목을 입력하시면 접수번호가 자동 생성됩니다</p>
      <div id="pub-form-area"></div>
      <div id="pub-success" style="display:none" class="success-box">
        <div class="success-icon">✅</div>
        <h3>신청 완료!</h3>
        <p>접수번호: <strong id="pub-result-no" style="color:var(--primary);font-size:18px"></strong></p>
        <p style="margin-top:8px">담당자가 검토 후 연락드리겠습니다.</p>
        <button class="btn-primary" style="margin-top:16px" onclick="resetPubForm()">새 신청 접수</button>
      </div>
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="screen-app" class="screen">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon-sm">🏗️</span>
        <div><div class="sidebar-title">모자분리 시스템</div><div class="sidebar-sub" id="sidebar-user"></div></div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer"><button class="btn-logout" onclick="doLogout()">로그아웃</button></div>
    </aside>
    <main class="main-content">

      <!-- 대시보드 -->
      <div id="page-dashboard" class="page active">
        <div class="page-header"><h2>📊 모자분리 진행현황</h2><span id="dash-date" class="page-date"></span></div>
        <div class="stat-cards" id="stat-cards"></div>
        <div class="dash-grid">
          <div class="dash-panel"><h3>팀별 현황</h3><div id="team-stats"></div></div>
          <div class="dash-panel"><h3>⚠️ 긴급 처리 필요</h3><div id="urgent-list"></div></div>
        </div>
        <div class="dash-panel full-width"><h3>최근 접수</h3><div id="recent-list"></div></div>
      </div>

      <!-- 신청목록 -->
      <div id="page-list" class="page">
        <div class="page-header">
          <h2>📋 모자분리 신청목록</h2>
          <button class="btn-primary" onclick="showPage('page-new-request')">+ 신규신청</button>
        </div>
        <div class="filter-bar">
          <select id="f-status" onchange="renderList()">
            <option value="">전체 상태</option>
            <option>접수</option><option>SKB검토</option><option>협력사접수</option><option>한전접수</option><option>처리완료</option>
          </select>
          <select id="f-team" onchange="renderList()"><option value="">전체 팀</option><option>강남</option><option>동작</option><option>수원</option></select>
          <select id="f-priority" onchange="renderList()"><option value="">전체 우선순위</option><option>긴급</option><option>보통</option></select>
          <input type="text" id="f-search" placeholder="🔍 건물명 / 접수NO 검색" oninput="renderList()">
          <button class="btn-outline" onclick="exportCSV()">📥 엑셀 다운로드</button>
        </div>
        <div class="table-wrap">
          <table class="data-table"><thead><tr id="t-head"></tr></thead><tbody id="t-body"></tbody></table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>

      <!-- 신규신청 -->
      <div id="page-new-request" class="page">
        <div class="page-header"><h2>✏️ 모자분리 신규신청</h2><button class="btn-ghost" onclick="showPage('page-list')">← 목록으로</button></div>
        <div class="form-card" id="new-req-wrap"></div>
      </div>

      <!-- 상세 -->
      <div id="page-detail" class="page">
        <div class="page-header"><h2>🔍 신청 상세</h2><button class="btn-ghost" onclick="showPage('page-list')">← 목록으로</button></div>
        <div id="detail-content"></div>
      </div>

      <!-- 사용자 관리 -->
      <div id="page-users" class="page">
        <div class="page-header"><h2>👥 사용자 관리</h2><button class="btn-primary" onclick="showAddUserModal()">+ 사용자 추가</button></div>
        <div id="user-content"></div>
      </div>

    </main>
  </div>
</div>

<!-- 모달 -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()"><div id="modal-body"></div></div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
